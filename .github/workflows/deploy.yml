name: Deploy to Staging

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${SERVER_PORT:-22} $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${SERVER_PORT:-22}" \
            --exclude '.git' \
            --exclude '.gitignore' \
            --exclude '.env' \
            --exclude '.DS_Store' \
            --exclude '.claude' \
            --exclude '.github' \
            --exclude '.vscode' \
            --exclude 'tests' \
            --exclude '*.md' \
            ./ ${SERVER_USER}@${SERVER_HOST}:/home/claude/site/public_html/wp-content/themes/flxlocalmedia/

  cache-purge:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Purge WPMU DEV hosting cache
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${SERVER_PORT:-22} $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key -p ${SERVER_PORT:-22} ${SERVER_USER}@${SERVER_HOST} \
            "wp eval 'if(function_exists(\"wpmudev_hosting_purge_static_cache\")){wpmudev_hosting_purge_static_cache();echo \"Hosting cache purged\";}else{echo \"No hosting cache function\";}'"

      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_EMAIL: ${{ secrets.CF_API_EMAIL }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        if: ${{ secrets.CF_ZONE_ID != '' }}
        run: |
          response=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "X-Auth-Email: ${CF_API_EMAIL}" \
            -H "X-Auth-Key: ${CF_API_KEY}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          success=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success', False))")
          if [ "$success" = "True" ]; then
            echo "Cloudflare cache purged successfully"
          else
            echo "Cloudflare cache purge failed: $response"
            exit 1
          fi
